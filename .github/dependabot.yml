version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - security

  - package-ecosystem: npm
    directory: /apps/agentgateway
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      agentgateway-dependencies:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - security

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      github-actions:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - security
