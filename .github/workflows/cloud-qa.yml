name: Cloud QA

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: cloud-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Astrail
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        timeout-minutes: 5
        run: npm ci

      - name: Audit production dependencies
        timeout-minutes: 5
        run: npm run audit:prod

      - name: Lint
        timeout-minutes: 5
        run: npm run lint

      - name: Typecheck
        timeout-minutes: 5
        run: npx tsc --noEmit --pretty false

      - name: Production env readiness smoke
        timeout-minutes: 2
        run: npm run smoke:env-readiness

      - name: Hosted MCP security smoke
        timeout-minutes: 5
        run: node scripts/smoke-mcp-endpoint-security.mjs

      - name: Waitlist security smoke
        timeout-minutes: 5
        run: npm run smoke:waitlist-security

      - name: Build
        timeout-minutes: 8
        run: npm run build
